apiVersion: apps/v1
kind: Deployment
metadata:
  name: imu-rehab-inference
  labels:
    app.kubernetes.io/name: imu-rehab-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: imu-rehab-inference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: imu-rehab-inference
    spec:
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inference
          # Replace with the immutable registry tag or digest built from this repo.
          image: registry.example/imu-rehab-cloud-inference:deployment-19
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: imu-rehab-inference
                  key: api-key
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 10001
            runAsGroup: 10001
---
apiVersion: v1
kind: Service
metadata:
  name: imu-rehab-inference
spec:
  selector:
    app.kubernetes.io/name: imu-rehab-inference
  ports:
    - name: http
      port: 80
      targetPort: http

